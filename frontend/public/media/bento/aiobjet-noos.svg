<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#030406"/>
      <stop offset="0.55" stop-color="#06080B"/>
      <stop offset="1" stop-color="#090B0E"/>
    </linearGradient>
    <radialGradient id="nebulaA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 600) rotate(130) scale(620 420)">
      <stop offset="0" stop-color="#3EC7FF" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#2A4F8A" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#08101C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 450) rotate(54) scale(640 360)">
      <stop offset="0" stop-color="#AD7EFF" stop-opacity="0.15"/>
      <stop offset="0.65" stop-color="#1A1331" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#090C11" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1048 552) rotate(90) scale(188)">
      <stop offset="0" stop-color="#F9FDFF"/>
      <stop offset="0.32" stop-color="#D4F3FF"/>
      <stop offset="0.62" stop-color="#74D9FF"/>
      <stop offset="1" stop-color="#0F1724"/>
    </radialGradient>
    <linearGradient id="ringStroke" x1="868" y1="402" x2="1238" y2="734" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7EEFF" stop-opacity="0.62"/>
      <stop offset="0.52" stop-color="#8FD9FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#4D8AA8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="beam" x1="290" y1="166" x2="290" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBF3FF" stop-opacity="0"/>
      <stop offset="0.17" stop-color="#C7EEFF" stop-opacity="0.52"/>
      <stop offset="0.52" stop-color="#79D9FF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#DBF3FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="microGrid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="blurSoft" x="-200" y="-200" width="2000" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="56"/>
    </filter>
    <filter id="orbGlow" x="720" y="220" width="660" height="660" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgBase)"/>
  <rect width="1600" height="1000" fill="url(#microGrid)"/>

  <ellipse cx="1130" cy="620" rx="490" ry="290" fill="url(#nebulaA)" filter="url(#blurSoft)"/>
  <ellipse cx="760" cy="450" rx="520" ry="260" fill="url(#nebulaB)" filter="url(#blurSoft)"/>

  <g opacity="0.85">
    <rect x="186" y="158" width="3" height="698" fill="url(#beam)"/>
    <rect x="236" y="158" width="2.5" height="698" fill="url(#beam)" opacity="0.8"/>
    <rect x="286" y="158" width="2.5" height="698" fill="url(#beam)" opacity="0.72"/>
    <rect x="336" y="158" width="2.5" height="698" fill="url(#beam)" opacity="0.64"/>
  </g>

  <path d="M372 702C520 642 670 604 862 564" stroke="#8DD7FF" stroke-opacity="0.42" stroke-width="1.5"/>
  <path d="M372 734C544 666 706 632 886 586" stroke="#CDEEFF" stroke-opacity="0.32" stroke-width="1"/>
  <path d="M372 670C560 596 734 558 912 530" stroke="#8DD7FF" stroke-opacity="0.28" stroke-width="1"/>

  <g filter="url(#orbGlow)">
    <circle cx="1048" cy="552" r="176" fill="url(#orbCore)"/>
    <circle cx="1048" cy="552" r="176" stroke="url(#ringStroke)" stroke-opacity="0.38"/>
    <ellipse cx="1048" cy="552" rx="238" ry="96" stroke="#CBEAFF" stroke-opacity="0.42" stroke-width="2"/>
    <ellipse cx="1048" cy="552" rx="212" ry="76" stroke="#95D8FF" stroke-opacity="0.3" stroke-width="1.5"/>
    <path d="M858 496C930 458 1168 448 1242 510" stroke="#D6F0FF" stroke-opacity="0.42" stroke-width="1.5"/>
    <path d="M866 626C952 690 1162 696 1232 640" stroke="#9CD9FF" stroke-opacity="0.35" stroke-width="1.3"/>
  </g>

  <g opacity="0.55">
    <circle cx="1240" cy="404" r="3.4" fill="#E8F6FF"/>
    <circle cx="1282" cy="446" r="2.5" fill="#B8E3FF"/>
    <circle cx="1328" cy="515" r="2.8" fill="#E8F6FF"/>
    <circle cx="1266" cy="688" r="2.4" fill="#B8E3FF"/>
    <circle cx="1204" cy="726" r="3.1" fill="#E8F6FF"/>
    <circle cx="1144" cy="756" r="2.6" fill="#B8E3FF"/>
  </g>

  <rect x="0" y="0" width="1600" height="1000" fill="black" fill-opacity="0.14"/>
</svg>
