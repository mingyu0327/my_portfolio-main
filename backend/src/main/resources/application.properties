# Server
server.port=${PORT:8080}

# Local H2 database for out-of-the-box development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/portfolio_db;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=${my-portfolio-super-secret-key-for-jwt-token-2026-very-long}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# 자동 DB 초기화: classpath의 sql/init.sql을 서버 시작시 실행
# spring.sql.init.* 설정은 Spring Boot 2.5+에서 사용됩니다.
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:sql/init.sql
spring.sql.init.data-locations=classpath:sql/data-clean.sql
